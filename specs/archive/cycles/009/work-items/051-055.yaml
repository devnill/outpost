  '051':
    title: Fix server.py security, correctness, and async issues
    complexity: easy
    scope:
    - mcp/remote-worker/server.py (modify)
    depends: []
    blocks: []
    criteria:
    - In _build_container_cmd, the ANTHROPIC_API_KEY argument is passed as "-e",
      "ANTHROPIC_API_KEY" (name only, no ={value}), so Docker inherits the variable
      from the host process environment without embedding the secret in the command list
    - In create_job, before creating the JobRecord, a guard checks if _agent_image
      is set and os.environ.get("ANTHROPIC_API_KEY") is falsy; if so, raises
      HTTPException(status_code=500, detail="ANTHROPIC_API_KEY is not set in the
      worker environment. Container mode requires ANTHROPIC_API_KEY to authenticate
      the claude CLI inside the container.")
    - In cancel_job, the subprocess.run(["docker", "stop", container_name]) call
      is wrapped as await asyncio.to_thread(subprocess.run, ["docker", "stop",
      container_name], timeout=15, capture_output=True) so it does not block the
      async event loop
    - In _process_job, the result is None branch (cancel-while-starting sentinel)
      calls _evict_terminal_jobs_locked() inside the job_store_lock block after
      setting record.duration_ms, consistent with all other terminal-state branches
    - All existing remote-worker tests pass
    - The ANTHROPIC_API_KEY change does not break any existing tests (no existing
      test asserts the value is embedded in the command)
