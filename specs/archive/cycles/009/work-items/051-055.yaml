      containers), OUTPOST_CONTAINER_CPUS (default 2, CPU limit for job containers)
    - A new Container Mode section (placed before API Reference) explains that when
      OUTPOST_AGENT_IMAGE is set each job runs in an ephemeral Docker container, the
      working_dir is bind-mounted to /workspace, and ANTHROPIC_API_KEY must be set in
      the server environment because it is forwarded into the container
    - No other content in the file is changed
