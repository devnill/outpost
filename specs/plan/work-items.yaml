items:
  '033':
    title: Fix cancel-while-starting race in _run_claude_job
    complexity: easy
    scope:
    - mcp/remote-worker/server.py (modify)
    - mcp/remote-worker/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - After Popen returns in _run_claude_job, before assigning record.process, the code
      checks record.status under job_store_lock; if status is already "cancelled", the
      new process is killed (proc.kill()) and the function returns None
    - After the check, record.process is assigned and the existing communicate/timeout
      logic runs unchanged for the normal (non-cancelled) path
    - At least one test covers the race scenario (cancel arrives while status is running
      but before process is assigned); the test verifies the process is killed and the
      job ends with status "cancelled", not still running
    - All existing remote-worker tests pass
  '028':
    title: Fix proc.terminate() race in cancel_job
    complexity: easy
    scope:
    - mcp/remote-worker/server.py (modify)
    - mcp/remote-worker/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - proc.terminate() in cancel_job is wrapped in try/except catching ProcessLookupError
      (and OSError as the broader catch)
    - proc.kill() in the SIGKILL fallback path is also wrapped in the same guard
    - If the process has already exited, the cancel operation returns normally (204)
      instead of propagating an exception as HTTP 500
    - At least one test covers the race scenario (process exits before terminate is
      called); the test verifies no exception is raised
    - All existing remote-worker tests pass
  '029':
    title: Handle FileNotFoundError for missing claude binary
    complexity: easy
    scope:
    - mcp/session-spawner/server.py (modify)
    - mcp/remote-worker/server.py (modify)
    - mcp/session-spawner/test_server.py (modify)
    - mcp/remote-worker/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - In session-spawner, FileNotFoundError from the claude subprocess call is caught
      and returns a structured MCP error response with exit_code 1 and error field
      containing a message such as "claude CLI not found on PATH. Ensure Claude Code
      is installed and the claude binary is accessible in the server process environment."
    - In remote-worker, FileNotFoundError from the claude subprocess call in _run_claude_job
      is caught and marks the job failed with the same actionable message instead of
      a raw Python exception string
    - At least one test per server covers the FileNotFoundError path and verifies
      the error message content is actionable (contains "claude" and "PATH")
    - No Python tracebacks or raw exception class names appear in the error response
      for either server
    - All existing tests pass
