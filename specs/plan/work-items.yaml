  '013':
    title: Fix poll_remote_job Auth-Error Priority
    complexity: easy
    scope:
    - mcp/session-spawner/server.py (modify)
    depends: []
    blocks: []
    criteria:
    - In _handle_poll_remote_job, the found-result pass executes before the auth-error
      pass
    - When one worker returns a found result and another returns a 401, the found
      result is returned to the caller
    - When all workers return auth errors and no found result exists, the auth error
      is still returned
    - When no worker has the job and no auth errors exist, the not-found fallback
      error is returned
    - Existing poll_remote_job tests pass without modification
  '014':
    title: Fix poll_remote_job Missing Timestamp Fields
    complexity: easy
    scope:
    - mcp/session-spawner/server.py (modify)
    depends: []
    blocks: []
    criteria:
    - In _poll_one(), the field copy list includes created_at, started_at, and completed_at
    - When the remote worker response body contains these fields, they appear in the
      poll_remote_job result
    - When the fields are absent from the response body (running job), they are not
      included (no KeyError)
    - Existing poll_remote_job tests pass without modification
  '015':
    title: Apply Role Constraints to Remote Sessions
    complexity: medium
    scope:
    - mcp/session-spawner/server.py (modify)
    - mcp/session-spawner/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - In _handle_spawn_remote_session, when role is a string name, it is resolved
      against _roles dict
    - Resolved allowed_tools from the role definition is included in the HTTP payload
      sent to the remote worker, unless the caller explicitly provided allowed_tools
    - Resolved permission_mode from the role definition is included in the HTTP payload,
      unless the caller explicitly provided permission_mode
    - When role is an inline dict (not a string), its fields are used directly (no
      lookup required)
    - When role is a string name not found in _roles, an error is returned before
      the HTTP request is made
    - When role is not provided, no role resolution occurs and the payload is unchanged
    - 'At least 3 new tests cover: role name resolves and fields propagate, unknown
      role name returns error, inline role dict passes through'
    - All existing spawn_remote_session tests pass
  '016':
    title: Update Architecture Document
    complexity: easy
    scope:
    - specs/plan/architecture.md (modify)
    depends: []
    blocks: []
    criteria:
    - poll_session is removed from the Component Map MCP Servers table and from the
      Tool Definitions section
    - spawn_session Tool Definitions output schema matches the actual implementation
      (output, exit_code, session_id, duration_ms, error, timed_out)
    - OUTPOST_CONCURRENCY in the Configuration env vars table is corrected to OUTPOST_MAX_CONCURRENCY
    - spawn_remote_session input parameter worker_url is renamed to worker_name to
      match the implementation (or the table accurately describes what the implementation
      accepts)
    - poll_remote_job input parameter worker_url is corrected to worker_name
    - 'list_remote_workers status values in the output description include ''ok''
      if that is what the implementation returns (health endpoint returns status:
      ''ok'')'
    - Authentication env var IDEATE_WORKER_API_KEY is correct (matches implementation)
    - No section references poll_session as an existing tool
  '017':
    title: Implement Running Job Cancellation
    complexity: medium
    scope:
    - mcp/remote-worker/server.py (modify)
    - mcp/remote-worker/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - JobRecord has a process field (type subprocess.Popen | None, default None)
    - _run_claude_job uses subprocess.Popen + communicate() instead of subprocess.run(),
      and stores the Popen object on the record before calling communicate()
    - 'cancel_job endpoint accepts running jobs: when status == ''running'', calls
      record.process.terminate(), waits up to 2 seconds, then calls record.process.kill()
      if still alive'
    - After cancellation of a running job, record.status is set to 'cancelled' and
      record.completed_at is set
    - cancel_job continues to return HTTP 409 for completed and failed jobs
    - cancel_job continues to set status 'cancelled' for queued jobs (existing behavior
      unchanged)
    - 'At least 2 new tests cover: cancel a running job returns 204 and sets status
      to cancelled; cancel a completed job still returns 409'
    - All existing remote-worker tests pass
    - The _process_job function handles the case where a job is cancelled mid-run
      (record.process is set before communicate() is called so the cancel endpoint
      can signal it)
