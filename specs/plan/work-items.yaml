  '043':
    title: Fix list_jobs missing timestamp fields and submit_job store ordering (NG2, NG4)
    complexity: easy
    scope:
    - mcp/remote-worker/server.py (modify)
    - mcp/remote-worker/test_server.py (modify)
    depends: []
    blocks: ['044']
    criteria:
    - In list_jobs(), each entry includes started_at (when not None) and completed_at
      (when not None) in addition to the existing job_id, status, role, created_at,
      and duration_ms fields
    - In create_job(), the job_store insertion (async with job_store_lock: job_store[job_id]
      = record) occurs BEFORE job_queue.put_nowait(job_id); if put_nowait raises
      asyncio.QueueFull, the store entry is rolled back (deleted under lock) before
      raising HTTPException 429
    - At least one test verifies that a completed job's started_at and completed_at
      appear in the GET /jobs list response
    - At least one test verifies that a running job's started_at appears in the list
      response but completed_at is absent
    - The existing test_create_job_queue_full_returns_429 continues to pass
    - All existing remote-worker tests pass
  '044':
    title: Add remote-worker cancel path tests (CF2, CF3, CF5)
    complexity: easy
    scope:
    - mcp/remote-worker/test_server.py (modify)
    depends: ['043']
    blocks: []
    criteria:
    - A test covers CF2: manually enqueue a job_id whose record has status "cancelled"
      (simulating cancel-while-queued), then call _worker(0) with a task and allow
      one iteration; verify _process_job is NOT called (the worker skips the job)
      and the job remains in the store with status "cancelled"
    - A test covers CF3: call _process_job directly with a job record whose _run_claude_job
      is patched to return None (cancel-while-starting sentinel); verify that only
      record.duration_ms is set and record.status remains "cancelled" (not "completed"
      or "failed"), and record.completed_at is not set by _process_job
    - A test covers CF5: call cancel_job on a running job whose mock process.terminate()
      succeeds but process.wait() (via asyncio.to_thread) does not return within 2s
      (mock asyncio.wait_for to raise asyncio.TimeoutError); verify proc.kill() is
      called after the timeout
    - All existing remote-worker tests pass
