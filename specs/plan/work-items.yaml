  '047':
    title: Dockerfile for outpost agent container image
    complexity: easy
    scope:
    - mcp/remote-worker/Dockerfile (create)
    depends: []
    blocks: []
    criteria:
    - Dockerfile exists at mcp/remote-worker/Dockerfile
