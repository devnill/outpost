items:
  '033':
    title: Fix cancel-while-starting race in _run_claude_job
    complexity: easy
    scope:
    - mcp/remote-worker/server.py (modify)
    - mcp/remote-worker/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - After Popen returns in _run_claude_job, before assigning record.process, the code
      checks record.status under job_store_lock; if status is already "cancelled", the
      new process is killed (proc.kill()) and the function returns None
    - After the check, record.process is assigned and the existing communicate/timeout
      logic runs unchanged for the normal (non-cancelled) path
    - At least one test covers the race scenario (cancel arrives while status is running
      but before process is assigned); the test verifies the process is killed and the
      job ends with status "cancelled", not still running
    - All existing remote-worker tests pass
  '028':
    title: Fix proc.terminate() race in cancel_job
    complexity: easy
    scope:
    - mcp/remote-worker/server.py (modify)
    - mcp/remote-worker/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - proc.terminate() in cancel_job is wrapped in try/except catching ProcessLookupError
      (and OSError as the broader catch)
    - proc.kill() in the SIGKILL fallback path is also wrapped in the same guard
    - If the process has already exited, the cancel operation returns normally (204)
      instead of propagating an exception as HTTP 500
    - At least one test covers the race scenario (process exits before terminate is
      called); the test verifies no exception is raised
    - All existing remote-worker tests pass
  '029':
    title: Handle FileNotFoundError for missing claude binary
    complexity: easy
    scope:
    - mcp/session-spawner/server.py (modify)
    - mcp/remote-worker/server.py (modify)
    - mcp/session-spawner/test_server.py (modify)
    - mcp/remote-worker/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - In session-spawner, FileNotFoundError from the claude subprocess call is caught
      and returns a structured MCP error response with exit_code 1 and error field
      containing a message such as "claude CLI not found on PATH. Ensure Claude Code
      is installed and the claude binary is accessible in the server process environment."
    - In remote-worker, FileNotFoundError from the claude subprocess call in _run_claude_job
      is caught and marks the job failed with the same actionable message instead of
      a raw Python exception string
    - At least one test per server covers the FileNotFoundError path and verifies
      the error message content is actionable (contains "claude" and "PATH")
    - No Python tracebacks or raw exception class names appear in the error response
      for either server
    - All existing tests pass
  '030':
    title: Fix conftest sys.modules key collision between test suites
    complexity: easy
    scope:
    - mcp/session-spawner/conftest.py (modify)
    - mcp/remote-worker/conftest.py (modify)
    - mcp/session-spawner/test_server.py (modify)
    - mcp/remote-worker/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - mcp/session-spawner/conftest.py registers the session-spawner server module
      under sys.modules["session_spawner_server"] (not "server")
    - mcp/remote-worker/conftest.py registers the remote-worker server module under
      sys.modules["remote_worker_server"] (not "server")
    - All import references to the old "server" key within each test file are updated
      to use the new module name
    - Running pytest from the repository root (pytest mcp/) completes without import
      errors or incorrect module resolution
    - All 121 tests pass when run from the repository root
  '031':
    title: Add --cwd flag to _run_claude_job and max_jobs to list_remote_workers output
    complexity: easy
    scope:
    - mcp/remote-worker/server.py (modify)
    - mcp/session-spawner/server.py (modify)
    - mcp/remote-worker/test_server.py (modify)
    - mcp/session-spawner/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - In _run_claude_job, the command list passed to subprocess.Popen includes "--cwd"
      followed by record.working_dir, positioned after "--max-turns" and before any
      other optional flags
    - The false docstring claim "Uses the same subprocess pattern as session-spawner"
      is removed or corrected to accurately describe the invocation
    - In _fetch_worker_health, the returned dict includes "max_jobs" field sourced
      from data.get("max_jobs") from the worker health response
    - At least one test verifies that --cwd appears in the command passed to Popen
      in a remote-worker job
    - At least one test verifies that list_remote_workers output includes max_jobs
      from the health response
    - All existing tests pass
  '032':
    title: Documentation sweep (cycle 7 minor gaps)
    complexity: easy
    scope:
    - README.md (modify)
    - CLAUDE.md (modify)
    - specs/plan/architecture.md (modify)
    depends: []
    blocks: []
    criteria:
    - README.md Usage section tool list includes cancel_remote_job as the fifth tool
    - README.md Configuration section includes a cross-reference to mcp/session-spawner/README.md
      and mcp/remote-worker/README.md for complete environment variable documentation,
      or lists the key security and observability variables (at minimum OUTPOST_SAFE_ROOT
      and OUTPOST_LOG_FILE)
    - CLAUDE.md Installation section references mcp/session-spawner/requirements.txt
      instead of the non-existent requirements.txt at the repository root
    - specs/plan/architecture.md Section 8 environment variable table includes a row
      for IDEATE_WORKER_MAX_JOBS with component (remote-worker), default (1000), and
      description (max jobs retained in the in-memory store before LRU eviction)
    - No other content in any of these files is changed beyond the specific items listed
  '012':
    title: Fix Installation Paths
    complexity: easy
    scope:
    - .claude-plugin/plugin.json (modify)
    - README.md (modify)
    depends: []
    blocks: []
