  '017':
    title: Implement Running Job Cancellation
    complexity: medium
    scope:
    - mcp/remote-worker/server.py (modify)
    - mcp/remote-worker/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - JobRecord has a process field (type subprocess.Popen | None, default None)
    - _run_claude_job uses subprocess.Popen + communicate() instead of subprocess.run(),
      and stores the Popen object on the record before calling communicate()
    - 'cancel_job endpoint accepts running jobs: when status == ''running'', calls
      record.process.terminate(), waits up to 2 seconds, then calls record.process.kill()
      if still alive'
    - After cancellation of a running job, record.status is set to 'cancelled' and
      record.completed_at is set
    - cancel_job continues to return HTTP 409 for completed and failed jobs
    - cancel_job continues to set status 'cancelled' for queued jobs (existing behavior
      unchanged)
    - 'At least 2 new tests cover: cancel a running job returns 204 and sets status
      to cancelled; cancel a completed job still returns 409'
    - All existing remote-worker tests pass
    - The _process_job function handles the case where a job is cancelled mid-run
      (record.process is set before communicate() is called so the cancel endpoint
      can signal it)
  '034':
    title: Fix _run_claude_job FileNotFoundError lock race and communicate() timeout
    complexity: easy
    scope:
    - mcp/remote-worker/server.py (modify)
    - mcp/remote-worker/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - In _run_claude_job, the FileNotFoundError handler is removed from the function
      body; the except clause returns (None, 1, "claude CLI not found on PATH. Ensure
      Claude Code is installed and the 'claude' binary is accessible in the server
      process environment.") as a normal 3-tuple instead of mutating the record directly
    - In _process_job, the result-is-None branch is updated to check whether result
      is exactly None (cancel-while-starting sentinel) vs. being the FileNotFoundError
      tuple; the FileNotFoundError case applies record.status="failed",
      record.exit_code=1, record.error=<message> under job_store_lock, then sets
      record.completed_at and duration_ms and calls _evict_terminal_jobs_locked()
    - The TimeoutExpired handler in _run_claude_job calls proc.communicate(timeout=10)
      on the second call (after proc.kill()); a nested try/except catches
      subprocess.TimeoutExpired from that call and falls back to empty bytes
    - At least one test covers the FileNotFoundError path end-to-end: Popen patched
      to raise FileNotFoundError; asserts job.status=="failed", job.exit_code==1,
      job.error contains "claude", job.completed_at is not None
    - All existing remote-worker tests pass
