  '048':
    title: Containerize job execution in _run_claude_job
    complexity: medium
    scope:
    - mcp/remote-worker/server.py (modify)
    depends: []
    blocks: ['049']
    criteria:
    - A new optional field container_name (str | None, default None) is added to JobRecord
    - When OUTPOST_AGENT_IMAGE env var is set, _run_claude_job builds a docker run command
      instead of a direct claude invocation
    - The docker run command includes all of -- --rm, --name job-{job_id}, --user 1000:1000,
      --cap-drop ALL, --security-opt no-new-privileges, --memory {OUTPOST_CONTAINER_MEMORY},
      --memory-swap {OUTPOST_CONTAINER_MEMORY}, --cpus {OUTPOST_CONTAINER_CPUS},
      --pids-limit 512, -v {working_dir}:/workspace, -e ANTHROPIC_API_KEY={key}
    - When OUTPOST_CONTAINER_RUNTIME is set (e.g. runsc for gVisor), --runtime {value}
      is added to the docker run command
    - Inside the container, claude is invoked with --cwd /workspace and
      --permission-mode dangerouslySkipPermissions (overrides record.permission_mode)
    - record.container_name is set to job-{job_id} before Popen is called when in
      container mode, and cleared to None after the container exits
    - When OUTPOST_AGENT_IMAGE is not set, _run_claude_job behaves identically to
      before this change (backward-compatible fallback)
    - _capture_git_diff is unchanged and runs against record.working_dir on the host
      after container exit (bind mount preserves all writes)
    - New module-level constants are added for OUTPOST_CONTAINER_MEMORY (default 4g),
      OUTPOST_CONTAINER_CPUS (default 2), and OUTPOST_AGENT_IMAGE (default empty)
    - All existing remote-worker tests pass
  '049':
    title: Tests for containerized job execution
    complexity: easy
    scope:
    - mcp/remote-worker/test_server.py (modify)
    depends: ['048']
    blocks: []
    criteria:
    - A test verifies that when OUTPOST_AGENT_IMAGE is set, the command passed to
      subprocess.Popen starts with docker and includes run (not claude as the first element)
    - A test verifies the container invocation includes --cap-drop ALL and
      --security-opt no-new-privileges
    - A test verifies the container invocation includes -v {working_dir}:/workspace
      as a bind mount argument
    - A test verifies the container invocation uses --permission-mode
      dangerouslySkipPermissions regardless of the value in record.permission_mode
    - A test verifies that when OUTPOST_AGENT_IMAGE is NOT set, the command passed
      to subprocess.Popen starts with claude (backward compat)
    - A test verifies that when OUTPOST_CONTAINER_RUNTIME is set to runsc, the
      container invocation includes --runtime runsc
    - All existing remote-worker tests pass
