  '036':
    title: Fix cancel_remote_job sequential fan-out
    complexity: easy
    scope:
    - mcp/session-spawner/server.py (modify)
    - mcp/session-spawner/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - _handle_cancel_remote_job fan-out when worker_name is not specified uses
      asyncio.gather instead of a sequential for-loop, mirroring the pattern used
      by _handle_poll_remote_job
    - A helper coroutine (e.g., _cancel_one) is introduced to encapsulate the per-worker
      cancel HTTP call, handling 204 (success), 404 (not found), 401/403 (auth error),
      and other errors in the same structured way as _poll_one
    - The first 204 response encountered in the gather results causes the tool to
      return success immediately; if no 204 is found, the existing error priority
      logic is applied (auth error > not found)
    - All existing cancel_remote_job tests pass without modification
    - At least one test verifies that cancel fan-out is concurrent (e.g., both workers
      receive a cancel request when worker_name is not specified, regardless of which
      one returns 204 first)
  '037':
    title: Fix _capture_git_diff subprocess leak on timeout
    complexity: easy
    scope:
    - mcp/remote-worker/server.py (modify)
    - mcp/remote-worker/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - In _capture_git_diff, the subprocess.TimeoutExpired handler calls proc.kill()
      followed by proc.communicate() (with no timeout needed — process is already
      killed) before returning None; this prevents the orphaned process from accumulating
      open pipe handles
    - The existing FileNotFoundError/OSError handler at the same level is preserved
      unchanged
    - At least one test covers the timeout path in _capture_git_diff: patches
      proc.communicate to raise subprocess.TimeoutExpired on the first call, then
      asserts proc.kill() was called and the function returns None
    - All existing remote-worker tests pass
  '038':
    title: Bound job_queue with maxsize and HTTP 429 back-pressure
    complexity: easy
    scope:
    - mcp/remote-worker/server.py (modify)
    - mcp/remote-worker/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - job_queue is declared as asyncio.Queue(maxsize=_max_jobs) instead of asyncio.Queue()
      so the queue size is bounded by the same limit as the job store
    - The submit_job endpoint (POST /jobs) checks asyncio.Queue.full() before calling
      put_nowait; if the queue is full, it returns HTTP 429 with a JSON body
      {"detail": "Job queue is full. Try again later."} instead of accepting the job
    - The existing 201 Created response path is unchanged for the non-full case
    - At least one test verifies that a POST /jobs request returns 429 when the queue
      is at capacity (patch job_queue to have maxsize=0 or fill it to capacity)
    - All existing remote-worker tests pass
  '039':
    title: Fix job_queue TOCTOU race with put_nowait
    complexity: easy
    scope:
    - mcp/remote-worker/server.py (modify)
    - mcp/remote-worker/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - In the submit_job endpoint, remove the separate job_queue.full() guard; replace
      await job_queue.put(job_id) with job_queue.put_nowait(job_id) wrapped in
      try/except asyncio.QueueFull that raises HTTPException(status_code=429,
      detail="Job queue is full. Try again later.")
    - The job_store record is NOT written before the put_nowait attempt; if QueueFull
      is raised, no orphaned job_store entry is left
    - The existing test_create_job_queue_full_returns_429 test passes without
      modification (or is updated only to reflect the new atomic implementation)
    - All existing remote-worker tests pass
  '040':
    title: Fix _handle_cancel_remote_job connection error masking
    complexity: easy
    scope:
    - mcp/session-spawner/server.py (modify)
    - mcp/session-spawner/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - In _handle_cancel_remote_job, the pass that previously returned on "conflict"
      or "error" results is split into two separate passes; the conflict pass returns
      immediately only on _status == "conflict" (HTTP 409); the error/connection-failure
      pass does NOT return immediately but collects errors for the final fallback
    - The final fallback message includes connection error details alongside
      not-found workers so the caller can distinguish network failures from
      confirmed absences
    - At least one test verifies that when worker A has a connection error and worker
      B returns 404, the tool returns a "not found" result (not "connection error"),
      because the job was confirmed absent on B
    - All existing cancel_remote_job tests pass
  '041':
    title: Replace FileNotFoundError sentinel with dedicated type
    complexity: easy
    scope:
    - mcp/remote-worker/server.py (modify)
    - mcp/remote-worker/test_server.py (modify)
    depends: []
    blocks: []
    criteria:
    - A module-level sentinel (e.g., _FILE_NOT_FOUND = object()) or a named dataclass
      is introduced; _run_claude_job returns this sentinel on FileNotFoundError instead
      of (None, 1, message)
    - _process_job detects the FileNotFoundError condition by identity check
      (result is _FILE_NOT_FOUND) or isinstance, not by checking output is None
      and exit_code == 1
    - A legitimate zero-stdout exit-code-1 result from claude no longer routes into
      the FileNotFoundError branch
    - The existing test for the FileNotFoundError path passes (updated as needed to
      use the new detection logic)
    - All existing remote-worker tests pass
