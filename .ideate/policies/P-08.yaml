description: When cancelling a containerized job, `docker stop` terminates the container and causes the host-side `docker run` process to exit. A subsequent `proc.terminate()` is always hitting an already-exited process. The `proc.terminate()` block must be gated on `not container_name` to avoid structurally incorrect exception-path execution on every container cancel.
