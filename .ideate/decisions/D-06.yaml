description: The `exec_instructions` parameter is injected into the child session's prompt and propagated to grandchild sessions via the `IDEATE_EXEC_INSTRUCTIONS` environment variable.
rationale: Enables consistent execution context across session depth without requiring callers to re-pass instructions at every level.
