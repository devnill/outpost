description: There is no global `OUTPOST_TIMEOUT` environment variable. Timeout is a per-call parameter with a server-side default. The architecture spec listed `OUTPOST_TIMEOUT` but the implementation chose per-call parameters instead.
rationale: Documented as intentional deviation during WI-011 verification. Per-call timeout gives callers fine-grained control without a global override.
