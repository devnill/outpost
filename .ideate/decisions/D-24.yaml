id: D-24
type: domain_decision
domain: remote-dispatch
status: settled
cycle: 1
supersedes: null
description: Each remote-worker job runs in an ephemeral Docker container (`--rm`) when `OUTPOST_AGENT_IMAGE` is set. Container is named `job-{job_id}` for cancel coordination. Host working directory is bind-mounted to `/workspace`. Container boundary replaces interactive permission checks; `--permission-mode dangerouslySkipPermissions` is always used inside container.
rationale: Security and modularity requirements for running unattended Claude Code with `--dangerously-skip-permissions`. Container isolation provides a hard boundary that replaces interactive permission prompts.
