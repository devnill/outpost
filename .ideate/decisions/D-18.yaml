description: "After role resolution in `_handle_spawn_remote_session`, prepend the resolved role's `system_prompt` to `payload[\"prompt\"]` using the same `[ROLE: {label}]\\n{system_prompt}\\n\\n{prompt}` pattern used in local `spawn_session`. The `spawn_remote_session` schema was also updated to accept inline role dicts (`oneOf [string, object]`)."
rationale: "Cycle 4 critical finding (CG1): `allowed_tools` and `permission_mode` were propagated by WI-015, but `system_prompt` was not. Roles like `reviewer`, `manager`, and `proxy-human` express behavioral contracts primarily through system_prompt. Omission silently degraded role guarantees for remote sessions."
