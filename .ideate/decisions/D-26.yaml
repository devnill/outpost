id: D-26
type: domain_decision
domain: remote-dispatch
status: settled
cycle: 1
supersedes: null
description: "`record.process = proc` is assigned immediately after the cancelled guard. `record.container_name = f\"job-{record.job_id}\"` is set only after `record.process` is assigned, both inside the same guard section. Both are cleared in the `finally` block."
rationale: Original code set `container_name` before `subprocess.Popen`, creating a race where `cancel_job` could call `docker stop` on a non-existent container.
