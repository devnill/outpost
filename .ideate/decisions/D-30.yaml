description: "`_build_container_cmd` passes `\"-e\", \"ANTHROPIC_API_KEY\"` (name-only, no `={value}`). Docker inherits the variable from the host process environment without embedding the secret in the command line."
rationale: The original form `f"ANTHROPIC_API_KEY={value}"` embedded the key in the process command list, visible via `ps aux` and `/proc/<pid>/cmdline`. Name-only form avoids process-table exposure.
