description: WI-015 propagated `allowed_tools`, `permission_mode`, and `max_turns` to remote sessions but omitted `system_prompt`. Local spawn prepends system_prompt to the prompt at lines 289-292; the remote dispatch path has no equivalent. Three built-in roles (`reviewer`, `manager`, `proxy-human`) express behavioral contracts primarily through system_prompt. The omission silently degrades role guarantees for remote sessions.
rationale: WI-015 was scoped to tool constraints and permission mode. The system_prompt dimension was not explicitly in or out of scope, producing an incomplete fix. Whether to propagate system_prompt requires user decision (see Q-10).
