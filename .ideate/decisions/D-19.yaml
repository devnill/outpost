id: D-19
type: domain_decision
domain: session-lifecycle
status: settled
cycle: 1
supersedes: null
description: Both session-spawner and remote-worker must catch `FileNotFoundError` when invoking the `claude` CLI and return a structured error message rather than propagating a raw Python exception. This is the most common new-user failure mode and has been flagged in four consecutive review cycles without being scheduled as a work item.
rationale: Raw `FileNotFoundError` produces a Python traceback (session-spawner) or opaque "failed" job status (remote-worker), neither of which tells the user what to do. GP-3 (Graceful Degradation) requires structured error responses for predictable failure modes.
