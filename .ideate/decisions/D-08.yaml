description: "`_session_registry` is a module-level Python list. JSONL disk logging is only active when `OUTPOST_LOG_FILE` is set; there is no default path. Session history is lost on server restart unless the operator configures logging."
rationale: Rationale not recorded. Contradicts hard constraint C4 and policies P-2, GP-2, GP-11 which require filesystem-based state.
