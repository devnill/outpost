id: D-20
type: domain_decision
domain: remote-dispatch
status: settled
cycle: 1
supersedes: null
description: Add `_evict_terminal_jobs_locked()` to remote-worker, called under `job_store_lock` after each job reaches terminal state. Eviction count capped at `min(needed, len(terminal))`. Controlled by `IDEATE_WORKER_MAX_JOBS` env var (default 1000). `max_jobs` added to health response.
rationale: Completed and failed jobs accumulated in `job_store` indefinitely, each holding full output. Long-running daemons would exhaust heap memory without bound. LRU eviction of terminal jobs prevents unbounded growth.
