description: "`cancel_job` wraps `subprocess.run([\"docker\", \"stop\", ...])` in `await asyncio.to_thread(...)` to avoid blocking the async event loop during the docker stop timeout window (up to 15 seconds)."
rationale: "`cancel_job` is `async def`. Direct `subprocess.run` would block the event loop, preventing other requests from being handled during the docker stop wait."
