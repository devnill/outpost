description: Container mode activates only when `OUTPOST_AGENT_IMAGE` is non-empty. Default is empty string (no container). When empty, `_run_claude_job` behaves identically to pre-cycle-8 behavior. No breaking changes for deployments that do not set the new env var.
rationale: Existing deployments must continue working without modification. Container mode is opt-in.
