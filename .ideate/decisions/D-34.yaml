description: The `_FILE_NOT_FOUND` sentinel log message now reads `"docker not found"` when `_agent_image` is set, vs `"claude not found"` otherwise. The error text stored in `record.error` already branched correctly (D-27); this fix aligns the log output to match.
rationale: Operators tailing logs in container mode were seeing "claude not found" when the real issue was a missing docker binary, misdirecting investigation.
