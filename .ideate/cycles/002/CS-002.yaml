  # Review Summary — Outpost Cycle 2 (brrr session)
  
  **Date**: 2026-03-22
  **Cycle**: 2
  **Work items executed**: WI-034, WI-035, WI-036
  
  ## Work Items
  
  | ID | Title | Outcome |
  |----|-------|---------|
  | WI-034 | Fix _run_claude_job FileNotFoundError lock race and communicate() timeout | Pass with rework (2 findings fixed) |
  | WI-035 | Cap _session_registry with bounded deque | Pass with rework (1 minor fixed) |
  | WI-036 | Fix cancel_remote_job sequential fan-out | Pass with rework (2 findings fixed) |
  
  ## Review Verdicts
  
  | Reviewer | Verdict | Critical | Significant | Minor |
  |----------|---------|----------|-------------|-------|
  | Code quality | Fail | 0 | 1 | 3 |
  | Spec adherence | Fail | 0 | 1 | 0 |
  | Gap analysis | — | 0 | 0 | 7 |
  
  ## Significant Findings
  
  **Code S1**: `_capture_git_diff` in `remote-worker/server.py:342-347` catches `subprocess.TimeoutExpired` and returns `None` without calling `proc.kill()` or `proc.communicate()`. The git subprocess continues running with open pipes — gradual resource leak under load.
  
  **Spec P7-1**: `job_queue: asyncio.Queue[str] = asyncio.Queue()` at `remote-worker/server.py:79` has no `maxsize`. Principle 7 states "unlimited is never the default." No back-pressure: `POST /jobs` always returns 201 regardless of queue depth.
  
  ## Carry-Forward Minor Findings
  
  - M1: TimeoutExpired path omits stderr from error message
  - M3: `_handle_spawn_remote_session` does not validate `working_dir` before HTTP calls
  - M5: conftest module alias dependency undocumented
  
  ## New Minor Gaps
  
  - NG1: `(None, 1, msg)` FileNotFoundError sentinel ambiguous — zero-stdout exit-1 claude result misrouted
  - NG2: `_session_registry` maxlen hard-coded in two places (server and test fixture)
  - NG3: `_evict_terminal_jobs_locked` warning branch untested
  - NG4: `proc.wait` in `asyncio.to_thread` cancel path — mock assertion style diverges
  
  ## Convergence
  
  **Not achieved.** Condition A fails (2 significant findings). Condition B fails (P7-1 principle violation).
  
  ## Next Steps
  
  Refinement cycle to address:
  1. `_capture_git_diff` subprocess leak (add `proc.kill()` + `proc.communicate()` in TimeoutExpired handler)
  2. Bounded `job_queue` (set `maxsize=_max_jobs`, return HTTP 429 when full)
