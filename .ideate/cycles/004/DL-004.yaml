  # Decision Log — Cycle 4
  
  **Produced**: 2026-03-20
  **Scope**: Decisions from cycle 3 (WI-012–017) plus new findings from cycle 4 re-verification review
  **Cycle 4 context**: No new work items were executed. Cycle 4 is a re-verification review of the codebase after cycle 3 returned a PASS verdict. The review found one new significant/critical issue introduced by WI-015.
  
  ---
  
  ## Recent Decisions (Cycle 3)
  
  Cycle 3 executed six work items (WI-012 through WI-017) in response to the cycle 2 comprehensive review (6 critical, 4 significant findings). Four planning decisions were made in a refinement interview before execution began. The cycle 3 final review returned PASS with 0 critical, 0 significant, and 5 minor findings. Cycle 4 re-verification found one new significant finding (S1/CG1) introduced as a regression by WI-015.
  
  ### Planning Phase — Refinement Interview (2026-03-16)
  
  #### D-001: Accept Synchronous spawn_session as Final Design
  - **Decision**: Accept synchronous `spawn_session` as the final design; do not implement `poll_session`
  - **Rationale**: Architecture originally defined async spawn+poll model, but implementation went synchronous without documentation. User confirmed synchronous is acceptable for the use case.
  
  #### D-002: Timeout Subprocess Kill — No Fix Required
  - **Decision**: No code change needed; `subprocess.run()` calls `process.kill()` internally before re-raising `TimeoutExpired`
  - **Rationale**: Verified via CPython source. Constraint C12 (Timeout Is Mandatory) is satisfied.
  
  #### D-003: Role Resolution for Remote Sessions — Option A
  - **Decision**: Session-spawner resolves role definition at dispatch time and sends resolved `allowed_tools` and `permission_mode` in the HTTP payload to the remote worker
  - **Rationale**: Option A chosen over Option B (worker-side resolution) — simpler deployment, no need to synchronize role definitions across worker nodes
  - **Implications**: Scoped to `allowed_tools` and `permission_mode`; `system_prompt` propagation not explicitly addressed, producing OQ-001
  
  #### D-004: Running Job Cancellation
  - **Decision**: Implement running job cancellation via SIGTERM/SIGKILL on the Popen handle stored in `JobRecord`
  - **Implications**: `DELETE /jobs/{id}` now cancels both queued and running jobs; no MCP-level cancel tool added (see OQ-002)
  
  ### Execution Phase (WI-012 through WI-017)
  
  #### D-005: Installation Path Corrections (WI-012)
  Fix `plugin.json` args path from `mcp/server.py` to `mcp/session-spawner/server.py`; fix README `pip install` and `claude mcp add` commands.
  
  #### D-006: poll_remote_job Auth-Error Priority Reversal (WI-013)
  Reorder poll_remote_job fan-out so found results are returned before auth errors. Resolves GP-3 violation where a single misconfigured worker blocked all polls.
  
  #### D-007: poll_remote_job Timestamp Field Propagation (WI-014)
  Extend `_poll_one()` field copy list to include `created_at`, `started_at`, `completed_at`.
  
  #### D-008: Role Constraints Applied to Remote Sessions (WI-015)
  Resolve role in `_handle_spawn_remote_session` before building HTTP payload; include resolved `allowed_tools` and `permission_mode` in POST /jobs body. `system_prompt` not included — creates regression OQ-001.
  
  #### D-009: Architecture Document Synchronization (WI-016)
  Update `architecture.md` to match implementation: remove `poll_session`, update `spawn_session` output schema, rename `OUTPOST_CONCURRENCY` to `OUTPOST_MAX_CONCURRENCY`, change `worker_url` to `worker_name`. Two residual inaccuracies remain: `cancelled` state description (OQ-004) and `OUTPOST_TIMEOUT` env var (OQ-005).
  
  #### D-010: Running Job Cancellation via Process Tracking (WI-017)
  Add `process` field to `JobRecord`; store Popen handle in `_run_claude_job`; `cancel_job` sends SIGTERM, waits 2 seconds, then SIGKILL. Remote-worker README not updated (OQ-003).
  
  ---
  
  ## Open Questions
  
  ### OQ-001: Should Remote Dispatch Propagate system_prompt? [NEW — Cycle 4]
  - **Question**: `_handle_spawn_remote_session` propagates `allowed_tools`, `permission_mode`, and `max_turns` from a resolved role but never prepends the role's `system_prompt` to `payload["prompt"]`. Local `spawn_session` does this correctly at lines 289–292. Should the remote dispatch path include the same system_prompt injection?
  - **Source**: Code-quality S1 and gap-analysis CG1 (cycle 4). Regression introduced by WI-015.
  - **Impact**: `reviewer`, `manager`, and `proxy-human` roles carry significant system prompts as their primary behavioral enforcement. A remote session assigned `role="reviewer"` receives tool restrictions but no behavioral framing. The failure is silent at call time. GP-8 and session-lifecycle P-4 remain violated for the system_prompt dimension of all remote sessions.
  - **Who answers**: User — confirm whether system_prompt should be propagated, or whether remote roles are formally tool-constraints-only.
  
  ### OQ-002: No MCP Tool to Cancel a Remote Job [Carried — Cycle 3]
  - **Question**: Should a `cancel_remote_job` tool be added to session-spawner to expose `DELETE /jobs/{job_id}` via the MCP interface?
  - **Impact**: Running remote jobs cannot be cancelled through outpost's MCP interface. The cancellation capability added in WI-017 is unreachable through the primary interface.
  
  ### OQ-003: Remote-Worker README Contradicts WI-017 [NEW — Cycle 4]
  - **Question**: `mcp/remote-worker/README.md` states only queued jobs can be cancelled (returns 409 for running). WI-017 extended cancellation to running jobs. Should README and job lifecycle diagram be updated?
  - **Source**: Cycle 4 gap-analysis SG1.
  
  ### OQ-004: Architecture Job-States Table Incomplete After WI-017 [NEW — Cycle 4]
  - **Question**: `specs/plan/architecture.md:223` describes `cancelled` as "Cancelled while queued." WI-017 made it reachable from `running`. Should the description be corrected?
  - **Source**: Cycle 4 spec-adherence MA2.
  
  ### OQ-005: OUTPOST_TIMEOUT in Architecture Has No Implementation [Carried — Cycle 2]
  - **Question**: `specs/plan/architecture.md:304` lists `OUTPOST_TIMEOUT` as a valid env var. No code reads it. Should the entry be removed or annotated?
  - **Source**: D-11 (session-lifecycle); cycle 4 spec-adherence MA3.
  
  ### OQ-006: Role Documentation Contradiction Worsened by WI-015 [Carried — Cycle 3]
  - **Question**: Both READMEs describe roles as an "observability label only" with no effect on remote sessions. WI-015 changed this — tool constraints and permission mode now propagate. Should both READMEs be corrected?
  - **Note**: Resolution depends on OQ-001. If system_prompt propagation is added, full correction is needed; if remote roles remain tool-constraints-only, partial correction suffices.
  
  ### OQ-007: Job Store Memory Leak — No Eviction Policy [Carried — Cycle 2, Third Cycle Open]
  - **Question**: `job_store` accumulates completed/failed/cancelled jobs indefinitely. Should an eviction policy (max size, TTL, delete-after-retrieval) be added?
  - **Impact**: Worker daemon will eventually exhaust memory. Operators must periodically restart as a workaround.
  
  ### OQ-008: No Integration Tests Between Components [Carried — Cycle 3]
  - **Question**: No test exercises the HTTP contract between session-spawner and remote-worker. Should integration tests be added?
  
  ### OQ-009: No Configuration Validation at Startup [Carried — Cycle 3]
  - **Question**: Remote-worker does not validate that `IDEATE_WORKER_API_KEY` is set at startup; session-spawner silently treats missing `api_key` as empty string. Should startup validation be added?
  
  ### OQ-010: token_usage Absent Rather Than Null in Normal-Path Responses [NEW — Cycle 4]
  - **Question**: In the non-timeout path of `spawn_session`, `token_usage` is omitted when extraction fails rather than set to null. The timeout path correctly emits null. Should the normal path be fixed to match P-3?
  - **Source**: Cycle 4 spec-adherence MA1.
  
  ### OQ-011: proc.terminate() Unguarded Against ProcessLookupError [Carried — Cycle 3]
  - **Question**: `cancel_job` at `mcp/remote-worker/server.py:275` calls `proc.terminate()` outside the lock with no exception handling. Should a `try/except OSError` guard be added?
  
  ---
  
  ## Cross-Cycle Patterns
  
  ### Pattern 1: Partial Fixes Introduce Adjacent Gaps
  
  Each cycle 3 work item that addressed a multi-dimension gap fixed only part of it:
  - WI-015 fixed `allowed_tools` and `permission_mode` propagation but omitted `system_prompt` (OQ-001). The omitted dimension is larger than what was fixed for behavioral roles.
  - WI-017 implemented running job cancellation on the remote-worker side but did not add a `cancel_remote_job` MCP tool (OQ-002) or update the README (OQ-003).
  - WI-016 synchronized visible architecture deviations but left two residual inaccuracies (OQ-004, OQ-005).
  
  The fix closes the flagged finding without sweeping the surrounding surface.
  
  ### Pattern 2: Architecture Documentation Drifts Incrementally
  
  The architecture document has been updated in targeted work items but each update leaves residual inaccuracies. After WI-016 — an explicit "synchronize architecture" work item — the document still contains incorrect state descriptions (MA2), a non-existent configuration variable (MA3), and undocumented implemented parameters (U1, U2). "Update architecture" work items correct the most visible deviations without sweeping the full document.
  
  ### Pattern 3: Persistent Gaps Require Design Decisions
  
  Three gaps have appeared in every gap-analysis since first identified:
  
  | Gap | First identified | Cycles open |
  |-----|-----------------|-------------|
  | Job store eviction policy | Cycle 2 | 3 |
  | No integration tests | Cycle 3 | 2 |
  | Role documentation contradiction | Cycle 3 | 2 |
  
  These require user decisions (what eviction semantics? what test infrastructure?) before implementation can proceed. Without a decision, they persist. The role documentation gap has now compounded: SG4 has become a two-dimensional contradiction after WI-015.
  
  ### Pattern 4: cancel_remote_job Tool Gap Persists
  
  Identified in cycle 3 as II4, re-identified in cycle 4 as SG2. WI-017 gave the remote-worker the cancellation capability but session-spawner has no corresponding MCP tool. The HTTP capability exists and is tested; the MCP interface does not expose it.
  
  ---
  
  ## Cross-References
  
  ### CR1: system_prompt Not Propagated to Remote Sessions
  - **Code review**: S1 — significant, mechanism at `server.py:751–768`
  - **Spec review**: P-4 compliance note — same finding via policy audit
  - **Gap analysis**: CG1 — critical, same mechanism, three affected roles identified
  
  All three reviewers converged on the same finding via independent entry points. The severity divergence (significant vs. critical) is a calibration difference, not factual. The fix is unambiguous: prepend `resolved_role.get("system_prompt")` to `payload["prompt"]` in `_handle_spawn_remote_session`.
  
  ### CR2: Architecture and README Documentation Residual Inaccuracies
  - **Code review**: Suggestion 3 — `IDEATE_WORKER_HOST` undocumented in architecture
  - **Spec review**: MA2 (cancelled state), MA3 (OUTPOST_TIMEOUT)
  - **Gap analysis**: SG1 (remote-worker README cancellation), SG4 (role behavior in both READMEs)
  
  MA2/MA3 and SG1/SG4 are all instances of targeted documentation work items failing to sweep the full document surface.
  
  ### CR3: Role System Completeness for Remote Dispatch
  - **Code review**: S1 (system_prompt omission); M3 (spawn_remote_session schema accepts only string for role but handler accepts dicts, bypassing validation)
  - **Spec review**: P-4 compliance note references S1
  - **Gap analysis**: CG1 (system_prompt); SG4 (documentation)
  
  Three distinct role-system issues coexist after WI-015: system_prompt not propagated (OQ-001), inline role dicts bypass validation (M3), documentation describes pre-fix state (OQ-006). The fix for OQ-001 should also evaluate whether the inline-dict bypass is intentional and whether it should be documented or constrained.
