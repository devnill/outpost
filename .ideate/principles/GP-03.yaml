id: GP-03
type: guiding_principle
name: Graceful Degradation
status: active
description: When a session fails, the system captures the failure reason and continues. Remote worker unavailability is handled gracefully with queueing and fallback. Timeouts are enforced with clear error reporting. The orchestrator never crashes due to worker failures.
