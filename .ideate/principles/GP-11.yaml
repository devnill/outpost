id: GP-11
type: guiding_principle
name: Stateless Server
status: active
description: The MCP server maintains no persistent state between tool calls. All session tracking uses the filesystem. This allows the server to be restarted without losing visibility into running sessions. Process state lives in the OS; job state lives in files.
