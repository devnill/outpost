type: guiding_principle
name: Configurable Dispatch
status: active
description: The user chooses whether sessions run locally or remotely. Local dispatch uses subprocess spawning with resource limits. Remote dispatch uses HTTP APIs to worker daemons. Both modes share the same job submission interface.
