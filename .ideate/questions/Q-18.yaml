description: Remote-worker's `_run_claude_job` sets `cwd=record.working_dir` on the subprocess but does not pass `--cwd` to the Claude CLI, unlike session-spawner which passes both. The `--cwd` flag controls Claude CLI project root for config discovery, CLAUDE.md loading, and trust boundary enforcement. A docstring falsely claims equivalent subprocess patterns between the two servers. Should `--cwd` be added to the remote-worker command, or is the difference intentional?
